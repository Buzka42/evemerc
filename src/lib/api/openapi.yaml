openapi: 3.0.3
info:
  title: 'FleetZone Intel Tool API Documentation'
  description: 'RESTful API for managing wormhole maps and solar system data in EVE Online. Access and manipulate collaborative mapping data for navigating wormhole space.'
  version: 1.0.0
servers:
  -
    url: 'https://wormhole.systems'
tags:
  -
    name: Endpoints
    description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'You can retrieve your personal access token by logging into the application, navigating to your account settings, and creating a new API token in the <b>API Tokens</b> section.'
security:
  -
    default: []
paths:
  /api/sovereignties:
    get:
      summary: ''
      operationId: getApiSovereignties
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                example: []
      tags:
        - Endpoints
  /api/maps:
    get:
      summary: ''
      operationId: getApiMaps
      description: ''
      parameters: []
      responses:
        200:
          description: 'Maps accessible to the authenticated user.'
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    -
                      id: 1
                      name: 'Fleet Operations'
                      slug: fleet-operations-1
                      default_region_id: 10000002
                      home_solarsystem_id: 30000142
                      rally_solarsystem_id: null
                      map_solarsystems: []
                      map_connections: []
                      owner:
                        id: 1
                        character_name: 'Example Commander'
                properties:
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        name: 'Fleet Operations'
                        slug: fleet-operations-1
                        default_region_id: 10000002
                        home_solarsystem_id: 30000142
                        rally_solarsystem_id: null
                        map_solarsystems: []
                        map_connections: []
                        owner:
                          id: 1
                          character_name: 'Example Commander'
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
                          example: 'Fleet Operations'
                        slug:
                          type: string
                          example: fleet-operations-1
                        default_region_id:
                          type: integer
                          example: 10000002
                        home_solarsystem_id:
                          type: integer
                          example: 30000142
                        rally_solarsystem_id:
                          type: string
                          example: null
                          nullable: true
                        map_solarsystems:
                          type: array
                          example: []
                        map_connections:
                          type: array
                          example: []
                        owner:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 1
                            character_name:
                              type: string
                              example: 'Example Commander'
      tags:
        - Endpoints
  '/api/maps/{slug}':
    get:
      summary: ''
      operationId: getApiMapsSlug
      description: ''
      parameters: []
      responses:
        200:
          description: 'Complete map snapshot for chain rendering and reconciliation.'
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    id: 1
                    name: 'Wormhole Operations'
                    slug: wormhole-operations-1
                    default_region_id: 10000002
                    home_solarsystem_id: 31000005
                    rally_solarsystem_id: 30000142
                    map_solarsystems:
                      -
                        id: 10
                        map_id: 1
                        alias: Home
                        status: scanned
                        occupier_alias: null
                        position:
                          x: 100
                          'y': 100
                        pinned: true
                        solarsystem_id: 31000005
                        signatures_count: 1
                        wormhole_signatures_count: 1
                        map_connections_count: 1
                        threat_level: null
                        signatures:
                          -
                            id: 100
                            signature_id: ABC-123
                            map_solarsystem_id: 10
                            target_class: null
                            extra: null
                            wormhole: null
                            signature_category: null
                            signature_type: null
                            raw_type_name: 'Unresolved site'
                            created_at: '2026-07-12T20:00:00Z'
                            updated_at: '2026-07-12T20:00:00Z'
                            lifetime_status: healthy
                            lifetime_status_updated_at: null
                            mass_status: null
                            map_connection_id: null
                    map_connections:
                      -
                        id: 20
                        from_map_solarsystem_id: 10
                        to_map_solarsystem_id: 11
                        mass_status: fresh
                        lifetime_status: healthy
                        lifetime_status_updated_at: null
                        signatures: []
                        ship_size: large
                        created_at: '2026-07-12T20:00:00Z'
                        updated_at: '2026-07-12T20:00:00Z'
                    saved_locations:
                      -
                        id: 30
                        map_id: 1
                        solarsystem_id: 30000142
                        note: 'Fleet rally'
                        created_at: '2026-07-12T20:00:00Z'
                        updated_at: '2026-07-12T20:00:00Z'
                    owner:
                      id: 1
                      character_name: 'Example Commander'
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: 'Wormhole Operations'
                      slug:
                        type: string
                        example: wormhole-operations-1
                      default_region_id:
                        type: integer
                        example: 10000002
                      home_solarsystem_id:
                        type: integer
                        example: 31000005
                      rally_solarsystem_id:
                        type: integer
                        example: 30000142
                      map_solarsystems:
                        type: array
                        example:
                          -
                            id: 10
                            map_id: 1
                            alias: Home
                            status: scanned
                            occupier_alias: null
                            position:
                              x: 100
                              'y': 100
                            pinned: true
                            solarsystem_id: 31000005
                            signatures_count: 1
                            wormhole_signatures_count: 1
                            map_connections_count: 1
                            threat_level: null
                            signatures:
                              -
                                id: 100
                                signature_id: ABC-123
                                map_solarsystem_id: 10
                                target_class: null
                                extra: null
                                wormhole: null
                                signature_category: null
                                signature_type: null
                                raw_type_name: 'Unresolved site'
                                created_at: '2026-07-12T20:00:00Z'
                                updated_at: '2026-07-12T20:00:00Z'
                                lifetime_status: healthy
                                lifetime_status_updated_at: null
                                mass_status: null
                                map_connection_id: null
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 10
                            map_id:
                              type: integer
                              example: 1
                            alias:
                              type: string
                              example: Home
                            status:
                              type: string
                              example: scanned
                            occupier_alias:
                              type: string
                              example: null
                              nullable: true
                            position:
                              type: object
                              properties:
                                x:
                                  type: integer
                                  example: 100
                                'y':
                                  type: integer
                                  example: 100
                            pinned:
                              type: boolean
                              example: true
                            solarsystem_id:
                              type: integer
                              example: 31000005
                            signatures_count:
                              type: integer
                              example: 1
                            wormhole_signatures_count:
                              type: integer
                              example: 1
                            map_connections_count:
                              type: integer
                              example: 1
                            threat_level:
                              type: string
                              example: null
                              nullable: true
                            signatures:
                              type: array
                              example:
                                -
                                  id: 100
                                  signature_id: ABC-123
                                  map_solarsystem_id: 10
                                  target_class: null
                                  extra: null
                                  wormhole: null
                                  signature_category: null
                                  signature_type: null
                                  raw_type_name: 'Unresolved site'
                                  created_at: '2026-07-12T20:00:00Z'
                                  updated_at: '2026-07-12T20:00:00Z'
                                  lifetime_status: healthy
                                  lifetime_status_updated_at: null
                                  mass_status: null
                                  map_connection_id: null
                              items:
                                type: object
                                properties:
                                  id:
                                    type: integer
                                    example: 100
                                  signature_id:
                                    type: string
                                    example: ABC-123
                                  map_solarsystem_id:
                                    type: integer
                                    example: 10
                                  target_class:
                                    type: string
                                    example: null
                                    nullable: true
                                  extra:
                                    type: string
                                    example: null
                                    nullable: true
                                  wormhole:
                                    type: string
                                    example: null
                                    nullable: true
                                  signature_category:
                                    type: string
                                    example: null
                                    nullable: true
                                  signature_type:
                                    type: string
                                    example: null
                                    nullable: true
                                  raw_type_name:
                                    type: string
                                    example: 'Unresolved site'
                                  created_at:
                                    type: string
                                    example: '2026-07-12T20:00:00Z'
                                  updated_at:
                                    type: string
                                    example: '2026-07-12T20:00:00Z'
                                  lifetime_status:
                                    type: string
                                    example: healthy
                                  lifetime_status_updated_at:
                                    type: string
                                    example: null
                                    nullable: true
                                  mass_status:
                                    type: string
                                    example: null
                                    nullable: true
                                  map_connection_id:
                                    type: string
                                    example: null
                                    nullable: true
                      map_connections:
                        type: array
                        example:
                          -
                            id: 20
                            from_map_solarsystem_id: 10
                            to_map_solarsystem_id: 11
                            mass_status: fresh
                            lifetime_status: healthy
                            lifetime_status_updated_at: null
                            signatures: []
                            ship_size: large
                            created_at: '2026-07-12T20:00:00Z'
                            updated_at: '2026-07-12T20:00:00Z'
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 20
                            from_map_solarsystem_id:
                              type: integer
                              example: 10
                            to_map_solarsystem_id:
                              type: integer
                              example: 11
                            mass_status:
                              type: string
                              example: fresh
                            lifetime_status:
                              type: string
                              example: healthy
                            lifetime_status_updated_at:
                              type: string
                              example: null
                              nullable: true
                            signatures:
                              type: array
                              example: []
                            ship_size:
                              type: string
                              example: large
                            created_at:
                              type: string
                              example: '2026-07-12T20:00:00Z'
                            updated_at:
                              type: string
                              example: '2026-07-12T20:00:00Z'
                      saved_locations:
                        type: array
                        example:
                          -
                            id: 30
                            map_id: 1
                            solarsystem_id: 30000142
                            note: 'Fleet rally'
                            created_at: '2026-07-12T20:00:00Z'
                            updated_at: '2026-07-12T20:00:00Z'
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 30
                            map_id:
                              type: integer
                              example: 1
                            solarsystem_id:
                              type: integer
                              example: 30000142
                            note:
                              type: string
                              example: 'Fleet rally'
                            created_at:
                              type: string
                              example: '2026-07-12T20:00:00Z'
                            updated_at:
                              type: string
                              example: '2026-07-12T20:00:00Z'
                      owner:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          character_name:
                            type: string
                            example: 'Example Commander'
      tags:
        - Endpoints
    put:
      summary: ''
      operationId: putApiMapsSlug
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
              required:
                - name
    parameters:
      -
        in: path
        name: slug
        description: 'The slug of the map.'
        example: scumlords-1
        required: true
        schema:
          type: string
  /api/map-solarsystems:
    post:
      summary: ''
      operationId: postApiMapSolarsystems
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                map_id:
                  type: string
                  description: 'The <code>id</code> of an existing record in the maps table.'
                  example: architecto
                solarsystem_id:
                  type: string
                  description: 'The <code>id</code> of an existing record in the solarsystems table.'
                  example: architecto
                alias:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: 'n'
                  nullable: true
                occupier_alias:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: g
                  nullable: true
                position_x:
                  type: number
                  description: 'Must be at least 20. Must not be greater than 3980.'
                  example: 16
                  nullable: true
                position_y:
                  type: number
                  description: 'Must be at least 20. Must not be greater than 1980.'
                  example: 17
                  nullable: true
                status:
                  type: string
                  description: ''
                  example: friendly
                  enum:
                    - active
                    - unknown
                    - unscanned
                    - hostile
                    - friendly
                    - empty
                  nullable: true
                pinned:
                  type: boolean
                  description: ''
                  example: false
              required:
                - map_id
                - solarsystem_id
  '/api/map-solarsystems/{id}':
    get:
      summary: ''
      operationId: getApiMapSolarsystemsId
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'An error occurred'
                  status: 401
                properties:
                  message:
                    type: string
                    example: 'An error occurred'
                  status:
                    type: integer
                    example: 401
      tags:
        - Endpoints
    put:
      summary: ''
      operationId: putApiMapSolarsystemsId
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                alias:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
                  nullable: true
                occupier_alias:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: 'n'
                  nullable: true
                position_x:
                  type: number
                  description: 'Must be at least 20. Must not be greater than 3980.'
                  example: 7
                  nullable: true
                position_y:
                  type: number
                  description: 'Must be at least 20. Must not be greater than 1980.'
                  example: 16
                  nullable: true
                status:
                  type: string
                  description: ''
                  example: empty
                  enum:
                    - active
                    - unknown
                    - unscanned
                    - hostile
                    - friendly
                    - empty
                  nullable: true
                pinned:
                  type: boolean
                  description: ''
                  example: true
                notes:
                  type: string
                  description: 'Must not be greater than 65535 characters.'
                  example: m
                  nullable: true
    delete:
      summary: ''
      operationId: deleteApiMapSolarsystemsId
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
    parameters:
      -
        in: path
        name: id
        description: 'The ID of the map solarsystem.'
        example: 1
        required: true
        schema:
          type: integer
  /api/v1/sde/version:
    get:
      summary: ''
      operationId: getApiV1SdeVersion
      description: ''
      parameters: []
      responses:
        200:
          description: 'Current desktop SDE snapshot version and download location.'
          content:
            application/json:
              schema:
                type: object
                example:
                  version: 77f27a1560a881749765944bab471492d3f2e1c72dc5f74574b5d86e9b797e06
                  size_bytes: 1048576
                  generated_at: '2026-07-12T20:00:00.000000Z'
                  url: 'https://wormhole.systems/api/v1/sde/snapshot'
                properties:
                  version:
                    type: string
                    example: 77f27a1560a881749765944bab471492d3f2e1c72dc5f74574b5d86e9b797e06
                  size_bytes:
                    type: integer
                    example: 1048576
                  generated_at:
                    type: string
                    example: '2026-07-12T20:00:00.000000Z'
                  url:
                    type: string
                    example: 'https://wormhole.systems/api/v1/sde/snapshot'
      tags:
        - Endpoints
  /api/v1/sde/snapshot:
    get:
      summary: ''
      operationId: getApiV1SdeSnapshot
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: ''
      tags:
        - Endpoints
  /api/v1/regions:
    get:
      summary: 'Return all k-space regions for the region selector dropdown.'
      operationId: returnAllKSpaceRegionsForTheRegionSelectorDropdown
      description: 'Reads from the static JSON file so no DB seeding is required.'
      parameters: []
      responses:
        500:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Internal Server Error'
                  status: 500
                properties:
                  message:
                    type: string
                    example: 'Internal Server Error'
                  status:
                    type: integer
                    example: 500
      tags:
        - Endpoints
  /api/v1/sovereignties:
    get:
      summary: ''
      operationId: getApiV1Sovereignties
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                example: []
      tags:
        - Endpoints
  '/api/v1/system/{solarsystemId}/sov-structures':
    get:
      summary: 'Return sovereignty structures in a solar system (ESI), cached globally for 5 minutes.'
      operationId: returnSovereigntyStructuresInASolarSystemESICachedGloballyFor5Minutes
      description: ''
      parameters: []
      responses:
        500:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Internal Server Error'
                  status: 500
                properties:
                  message:
                    type: string
                    example: 'Internal Server Error'
                  status:
                    type: integer
                    example: 500
      tags:
        - Endpoints
    parameters:
      -
        in: path
        name: solarsystemId
        description: ''
        example: architecto
        required: true
        schema:
          type: string
  /api/v1/desktop/latest-version:
    get:
      summary: ''
      operationId: getApiV1DesktopLatestVersion
      description: ''
      parameters: []
      responses:
        200:
          description: 'Latest supported EVEMerc Desktop release.'
          content:
            application/json:
              schema:
                type: object
                example:
                  version: 0.1.0
                  download_url: 'https://wormhole.systems/downloads/evemerc-desktop'
                properties:
                  version:
                    type: string
                    example: 0.1.0
                  download_url:
                    type: string
                    example: 'https://wormhole.systems/downloads/evemerc-desktop'
      tags:
        - Endpoints
  '/api/v1/share/{token}':
    get:
      summary: ''
      operationId: getApiV1ShareToken
      description: ''
      parameters: []
      responses:
        404:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Not Found'
                  status: 404
                properties:
                  message:
                    type: string
                    example: 'Not Found'
                  status:
                    type: integer
                    example: 404
      tags:
        - Endpoints
    parameters:
      -
        in: path
        name: token
        description: ''
        example: architecto
        required: true
        schema:
          type: string
  /api/v1/auth/token:
    post:
      summary: ''
      operationId: postApiV1AuthToken
      description: ''
      parameters: []
      responses:
        200:
          description: 'Desktop access token issued.'
          content:
            application/json:
              schema:
                type: object
                example:
                  token: 1|example-plain-text-token
                properties:
                  token:
                    type: string
                    example: 1|example-plain-text-token
        422:
          description: 'Invalid, expired, or already consumed authorization code.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'The given data was invalid.'
                  errors:
                    code:
                      - 'The desktop authorization code is invalid or has expired.'
                properties:
                  message:
                    type: string
                    example: 'The given data was invalid.'
                  errors:
                    type: object
                    properties:
                      code:
                        type: array
                        example:
                          - 'The desktop authorization code is invalid or has expired.'
                        items:
                          type: string
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  description: 'Single-use authorization code returned to the desktop callback. Must contain only letters and numbers. Must be 64 characters.'
                  example: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
                code_verifier:
                  type: string
                  description: 'Original PKCE verifier used to create the login challenge. Must match the regex /^[A-Za-z0-9._~-]+$/. Must be at least 43 characters. Must not be greater than 128 characters.'
                  example: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
                device_name:
                  type: string
                  description: 'Human-readable device name shown for the issued token. Must not be greater than 120 characters.'
                  example: 'Fleet Command Laptop'
              required:
                - code
                - code_verifier
                - device_name
    delete:
      summary: ''
      operationId: deleteApiV1AuthToken
      description: ''
      parameters: []
      responses:
        204:
          description: 'The current desktop access token was revoked.'
          content:
            application/json:
              schema:
                type: object
                nullable: true
      tags:
        - Endpoints
  /api/v1/me:
    get:
      summary: ''
      operationId: getApiV1Me
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'An error occurred'
                  status: 401
                properties:
                  message:
                    type: string
                    example: 'An error occurred'
                  status:
                    type: integer
                    example: 401
      tags:
        - Endpoints
  /api/v1/account/characters:
    get:
      summary: ''
      operationId: getApiV1AccountCharacters
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'An error occurred'
                  status: 401
                properties:
                  message:
                    type: string
                    example: 'An error occurred'
                  status:
                    type: integer
                    example: 401
      tags:
        - Endpoints
  '/api/v1/account/characters/{character_id}/active':
    put:
      summary: ''
      operationId: putApiV1AccountCharactersCharacter_idActive
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
    parameters:
      -
        in: path
        name: character_id
        description: 'The ID of the character.'
        example: 94497449
        required: true
        schema:
          type: integer
  '/api/v1/account/characters/{character_id}/preferred':
    put:
      summary: ''
      operationId: putApiV1AccountCharactersCharacter_idPreferred
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
    parameters:
      -
        in: path
        name: character_id
        description: 'The ID of the character.'
        example: 94497449
        required: true
        schema:
          type: integer
  '/api/v1/account/characters/{id}':
