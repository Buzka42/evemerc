  /api/v1/location-observations:
    post:
      summary: ''
      operationId: postApiV1LocationObservations
      description: ''
      parameters: []
      responses:
        201:
          description: 'The normalized location observation was stored.'
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 101
                  character_id: 90000001
                  solar_system_id: 30000142
                  state: in_transit
                  source: eve_gamelog
                  observed_at: '2026-07-12T20:00:00.000000Z'
                  applied: true
                  revision: 8
                properties:
                  id:
                    type: integer
                    example: 101
                  character_id:
                    type: integer
                    example: 90000001
                  solar_system_id:
                    type: integer
                    example: 30000142
                  state:
                    type: string
                    example: in_transit
                  source:
                    type: string
                    example: eve_gamelog
                  observed_at:
                    type: string
                    example: '2026-07-12T20:00:00.000000Z'
                  applied:
                    type: boolean
                    example: true
                  revision:
                    type: integer
                    example: 8
        409:
          description: 'Duplicate or stale observation.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'This observation duplicates one already received.'
                properties:
                  message:
                    type: string
                    example: 'This observation duplicates one already received.'
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                character_id:
                  type: integer
                  description: 'Authenticated user-owned EVE character ID. The <code>id</code> of an existing record in the characters table.'
                  example: 90000001
                solar_system_id:
                  type: integer
                  description: 'Destination solar-system ID resolved from the local SDE. The <code>id</code> of an existing record in the solarsystems table.'
                  example: 30000142
                observed_at:
                  type: string
                  description: 'Timestamp from the EVE Gamelog line. Must be a valid date.'
                  example: '2026-07-12T20:00:00Z'
                state:
                  type: string
                  description: 'Normalized location state.'
                  example: in_transit
                  enum:
                    - confirmed
                    - in_transit
                source_event_id:
                  type: string
                  description: 'SHA-256 identifier used for privacy-preserving deduplication. Must match the regex /^[a-f0-9]{64}$/.'
                  example: cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
              required:
                - character_id
                - solar_system_id
                - observed_at
                - state
                - source_event_id
